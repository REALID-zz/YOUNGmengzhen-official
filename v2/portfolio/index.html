<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>跳转中…｜孟臻（DCT）</title>
    <meta name="description" content="跳转到孟臻（DCT）单页官网作品区块。" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=../../#works" />
    <link rel="canonical" href="https://realid-zz.github.io/YOUNGmengzhen-official/" />
    <meta name="theme-color" content="#07080c" />
    <style>
      :root{
        --bg:#06070b;
        --card:rgba(255,255,255,.06);
        --line:rgba(255,255,255,.12);
        --text:rgba(255,255,255,.92);
        --muted:rgba(255,255,255,.68);
        --accent:#9ae6ff;
        --accent2:#c6a6ff;
        --shadow: 0 28px 80px rgba(0,0,0,.52);
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        color:var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(900px 520px at 12% 18%, rgba(154,230,255,.22), transparent 62%),
          radial-gradient(820px 560px at 82% 22%, rgba(198,166,255,.18), transparent 62%),
          radial-gradient(760px 560px at 55% 92%, rgba(255,255,255,.08), transparent 62%),
          var(--bg);
      }
      a{color:var(--accent); text-decoration:none}
      a:hover{text-decoration:underline}
      .wrap{max-width:1200px; margin:0 auto; padding:22px 18px 64px}
      .top{
        display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
        position:sticky; top:0; z-index:20;
        padding:12px 18px;
        margin: -22px -18px 0;
        backdrop-filter: blur(14px);
        background: rgba(6,7,11,.58);
        border-bottom:1px solid rgba(255,255,255,.10);
      }
      .brand{display:flex; gap:10px; align-items:baseline}
      .brand h1{margin:0; font-size:14px}
      .brand span{color:var(--muted); font-size:12px}
      .nav{display:flex; gap:14px; flex-wrap:wrap; align-items:center}
      .nav a{color:rgba(255,255,255,.82); font-size:12px}
      .pill{
        border:1px solid rgba(255,255,255,.16);
        background: rgba(255,255,255,.06);
        padding:8px 10px;
        border-radius:999px;
        box-shadow: 0 8px 30px rgba(0,0,0,.26);
      }

      .hero{
        margin-top:16px;
        border-radius:18px;
        border:1px solid rgba(255,255,255,.14);
        background:
          linear-gradient(120deg, rgba(154,230,255,.16), rgba(198,166,255,.12)),
          radial-gradient(800px 520px at 30% 20%, rgba(255,255,255,.10), transparent 60%),
          rgba(255,255,255,.04);
        overflow:hidden;
        box-shadow: var(--shadow);
        position:relative;
        isolation:isolate;
      }
      .hero::before{
        content:"";
        position:absolute; inset:-2px;
        background: url("../../assets/hero.png") center/cover no-repeat;
        opacity:.18;
        filter: saturate(1.08) contrast(1.06);
        transform: scale(1.04);
        z-index:-2;
      }
      .hero::after{
        content:"";
        position:absolute; inset:0;
        background: radial-gradient(900px 520px at 20% 25%, rgba(0,0,0,.0), rgba(0,0,0,.55));
        z-index:-1;
      }
      .heroInner{
        padding:18px 16px;
        display:flex; justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap;
      }
      .title{margin:0; font-size:22px}
      .hint{color:rgba(255,255,255,.72); font-size:12px; line-height:1.6; max-width:70ch}
      .search{
        display:flex; align-items:center; gap:8px;
        border:1px solid rgba(255,255,255,.16);
        background: rgba(0,0,0,.18);
        border-radius:999px;
        padding:9px 10px;
        min-width: 260px;
      }
      .search input{border:0; outline:none; background:transparent; color:rgba(255,255,255,.92); width:100%}

      .grid{
        margin-top:14px;
        columns: 4 260px;
        column-gap: 12px;
      }
      .item{
        break-inside: avoid;
        margin: 0 0 12px;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 16px;
        background: rgba(255,255,255,.04);
        overflow:hidden;
        cursor:pointer;
        transition: transform 120ms ease, border-color 120ms ease;
      }
      .item:hover{ transform: translateY(-2px); border-color: rgba(154,230,255,.35); }
      .thumb{
        width:100%;
        aspect-ratio: 4/5;
        background:
          radial-gradient(500px 350px at 30% 30%, rgba(154,230,255,.24), transparent 60%),
          radial-gradient(450px 300px at 70% 60%, rgba(198,166,255,.20), transparent 60%),
          rgba(0,0,0,.25);
        display:flex; align-items:center; justify-content:center;
        color:rgba(255,255,255,.55);
        font-size:12px;
      }
      .thumb img{ width:100%; height:100%; object-fit:cover; display:none; }
      .meta{ padding: 12px 12px 14px; }
      .meta .t{ margin:0; font-size:13px; }
      .meta .m{ margin:6px 0 0; color:rgba(255,255,255,.72); font-size:12px; line-height:1.55; }

      .modal{
        position:fixed; inset:0;
        background: rgba(0,0,0,.72);
        display:none;
        align-items:center; justify-content:center;
        padding:18px;
        z-index:50;
      }
      .modal.open{ display:flex; }
      .modalCard{
        width: min(1100px, 100%);
        max-height: min(92vh, 900px);
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(8,9,12,.92);
        overflow:hidden;
        display:grid;
        grid-template-columns: 1fr 360px;
      }
      @media (max-width: 980px){ .modalCard{ grid-template-columns: 1fr; } }
      .modalMedia{ background: rgba(255,255,255,.04); display:flex; align-items:center; justify-content:center; }
      .modalMedia img{ max-width:100%; max-height:70vh; display:block; }
      .modalInfo{ padding:14px 14px 18px; border-left:1px solid rgba(255,255,255,.10); }
      @media (max-width: 980px){ .modalInfo{ border-left:0; border-top:1px solid rgba(255,255,255,.10); } }
      .k{ color:rgba(255,255,255,.62); font-size:11px; letter-spacing:.16em; text-transform:uppercase; }
      .closeBtn{
        border:1px solid rgba(255,255,255,.18);
        background: rgba(255,255,255,.06);
        color: rgba(255,255,255,.88);
        border-radius: 10px;
        padding:8px 10px;
        cursor:pointer;
      }
      .modalInfo h2{ margin:10px 0 0; font-size:18px; }
      .modalInfo p{ margin:10px 0 0; color:rgba(255,255,255,.74); line-height:1.7; font-size:13px; }
      footer{ margin-top:16px; color:rgba(255,255,255,.60); font-size:12px; line-height:1.7; }
    </style>
  </head>
  <body>
    <script>location.replace('../../#works');</script>
    <div class="wrap">
      <div class="top">
        <div class="brand">
          <h1>孟臻（DCT）</h1>
          <span>v2 作品集 · 自动读取 assets/works/</span>
        </div>
        <div class="nav">
          <a class="pill" href="../">v2 首页</a>
          <a href="../../portfolio/">当前作品集</a>
          <a href="../../mengzhen/">官方档案</a>
          <a href="mailto:hihelloaikenni@gemail.com">联系</a>
        </div>
      </div>

      <section class="hero">
        <div class="heroInner">
          <div>
            <h2 class="title">Works</h2>
            <div class="hint">只要把作品图片上传到仓库 <strong>assets/works/</strong>，这里会自动铺满。主荧幕：<strong>assets/hero.png</strong>。</div>
          </div>
          <div class="search" role="search">
            <input id="q" placeholder="搜索作品：标题 / 年份 / 媒介…" autocomplete="off" />
          </div>
        </div>
      </section>

      <div id="grid" class="grid" aria-label="works grid"></div>

      <footer>公开版口径不包含个人敏感信息。点击作品可放大查看。</footer>
    </div>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="work viewer">
      <div class="modalCard">
        <div class="modalMedia"><img id="modalImg" alt="" /></div>
        <div class="modalInfo">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <div class="k">Work</div>
            <button id="close" class="closeBtn">关闭</button>
          </div>
          <h2 id="modalTitle"></h2>
          <p id="modalMeta"></p>
          <p id="modalDesc"></p>
        </div>
      </div>
    </div>

    <script>
      const state = { works: [], filtered: [] };
      const elGrid = document.getElementById('grid');
      const elQ = document.getElementById('q');
      const modal = document.getElementById('modal');
      const modalImg = document.getElementById('modalImg');
      const modalTitle = document.getElementById('modalTitle');
      const modalMeta = document.getElementById('modalMeta');
      const modalDesc = document.getElementById('modalDesc');

      function safe(s){ return (s ?? '').toString(); }
      function titleFromFilename(name){
        return safe(name)
          .replace(/\.[^.]+$/, '')
          .replace(/[_-]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }
      function matchWork(w, q){
        const hay = [w.title, w.year, w.medium, w.size, w.series, w.tags?.join(' '), w.desc]
          .map(safe).join(' ').toLowerCase();
        return hay.includes(q);
      }
      function render(list){
        elGrid.innerHTML = '';
        for (const w of list){
          const card = document.createElement('div');
          card.className = 'item';
          card.tabIndex = 0;

          const thumb = document.createElement('div');
          thumb.className = 'thumb';
          const img = document.createElement('img');
          if (w.image){
            img.src = w.image;
            img.loading = 'lazy';
            img.alt = w.title || 'work';
            img.style.display = 'block';
            thumb.appendChild(img);
          } else {
            thumb.textContent = 'No image yet';
            thumb.appendChild(img);
          }

          const meta = document.createElement('div');
          meta.className = 'meta';
          const t = document.createElement('p');
          t.className = 't';
          t.textContent = w.title || 'Untitled';
          const m = document.createElement('p');
          m.className = 'm';
          m.textContent = [w.year, w.medium, w.size].filter(Boolean).join(' · ') || '—';
          meta.appendChild(t); meta.appendChild(m);

          card.appendChild(thumb);
          card.appendChild(meta);

          function open(){
            modal.classList.add('open');
            modalImg.src = w.image || '';
            modalImg.alt = w.title || 'work';
            modalTitle.textContent = w.title || 'Untitled';
            modalMeta.textContent = [w.year, w.medium, w.size, w.series].filter(Boolean).join(' · ');
            modalDesc.textContent = w.desc || '';
          }
          card.addEventListener('click', open);
          card.addEventListener('keydown', (e)=>{ if (e.key === 'Enter') open(); });
          elGrid.appendChild(card);
        }
      }
      function filter(){
        const q = (elQ.value || '').trim().toLowerCase();
        state.filtered = q ? state.works.filter(w => matchWork(w, q)) : state.works;
        render(state.filtered);
      }
      document.getElementById('close').addEventListener('click', ()=> modal.classList.remove('open'));
      modal.addEventListener('click', (e)=>{ if (e.target === modal) modal.classList.remove('open'); });
      elQ.addEventListener('input', filter);

      async function loadFromGithubFolder(){
        const pagesOwner = (location.hostname || '').split('.')[0] || 'REALID-zz';
        const repoFromPath = (location.pathname || '').split('/').filter(Boolean)[0] || 'YOUNGmengzhen-official';
        const owners = [pagesOwner, 'REALID-zz'].filter((v, i, a) => v && a.indexOf(v) === i);
        const refs = ['main', 'master'];
        const repo = repoFromPath;
        const path = 'assets/works';
        for (const owner of owners){
          for (const ref of refs){
            const api = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${ref}`;
            const r = await fetch(api, { headers: { Accept: 'application/vnd.github+json' } });
            if (!r.ok) continue;
            const data = await r.json();
            if (!Array.isArray(data)) continue;
            const list = data
              .filter(x => x && x.type === 'file' && /\.(png|jpe?g|webp|gif)$/i.test(x.name || ''))
              .map(x => ({
                id: x.sha || x.name,
                title: titleFromFilename(x.name || ''),
                year: '',
                medium: '',
                size: '',
                series: '',
                tags: [],
                desc: '',
                image: x.download_url || ''
              }));
            if (list.length) return list;
          }
        }
        return [];
      }

      async function load(){
        try{
          const list = await loadFromGithubFolder();
          if (list.length){
            state.works = list;
            filter();
            return;
          }
        } catch {}
        state.works = [{ title: '暂无作品图（请上传到 assets/works/）', desc: '上传后刷新本页会自动铺满。' }];
        filter();
      }

      load();
    </script>
  </body>
</html>
